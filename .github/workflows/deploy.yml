name: Deploy Dentist CMS
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Loyihaning asosiy papkasini doimiy o'zgaruvchiga olamiz
            PROJECT_DIR="/var/www/dentist-cms-dashboard"
            
            echo "🛠️ 1-bosqich: Loyihani Git'dan yangilash..."
            cd $PROJECT_DIR
            git pull origin main
            
            # ==========================================
            # 2. BACKEND YANGILANISHI
            # ==========================================
            echo "⚙️ 2-bosqich: Backend'ni yangilash va ishga tushirish..."
            cd $PROJECT_DIR/backend
            npm install
            
            # pm2 da bormi yoki yo'q tekshirib, shunga qarab restart yoki start qilamiz
            pm2 restart backend-api --update-env || pm2 start server.js --name "backend-api"
            
            # ==========================================
            # 3. FRONTEND YANGILANISHI
            # ==========================================
            echo "🖥️ 3-bosqich: Frontend'ni yangilash va build qilish..."
            cd $PROJECT_DIR
            npm install
            
            # RAM muammosi bo'lmasligi uchun xotirani optimallashtirib build ishga tushiramiz
            NODE_OPTIONS="--max-old-space-size=2048" npm run build
            
            # Next.js dasturini pm2 orqali xavfsiz va to'g'ri port (3000) bilan ishga tushirish
            pm2 restart frontend-app --update-env || pm2 start npm --name "frontend-app" -- start -- -p 3000
            
            # ==========================================
            # 4. YAKUNIY BOSQICH
            # ==========================================
            echo "💾 4-bosqich: Sozlamalarni saqlash..."
            pm2 save
            
            echo "✅ Hammasi muvaffaqiyatli amalga oshirildi!"
